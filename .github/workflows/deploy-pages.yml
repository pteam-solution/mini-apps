name: Deploy Mini Apps to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/team-randomizer/package-lock.json

      - name: Install team-randomizer dependencies
        working-directory: apps/team-randomizer
        run: npm ci

      - name: Build team-randomizer
        working-directory: apps/team-randomizer
        run: npm run build

      - name: Collect site files
        run: |
          mkdir -p public/team-randomizer
          cp -R apps/team-randomizer/dist/. public/team-randomizer/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
