<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Apps</title>
    <style>
      :root {
        font-family:
          Inter, Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202e;
        background: #f7f9fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      main {
        width: min(920px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 56px 24px;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        line-height: 1.15;
      }

      p {
        margin: 14px 0 0;
        color: #647386;
        font-size: 17px;
        line-height: 1.65;
      }

      .app-list {
        display: grid;
        gap: 16px;
        margin-top: 34px;
      }

      .app-link {
        display: grid;
        gap: 8px;
        padding: 24px;
        border: 1px solid #d6dee6;
        border-radius: 8px;
        background: #ffffff;
        color: inherit;
        text-decoration: none;
        box-shadow: 0 14px 36px rgba(24, 33, 47, 0.05);
        transition:
          border-color 150ms ease,
          box-shadow 150ms ease,
          transform 150ms ease;
      }

      .app-link:hover,
      .app-link:focus-visible {
        border-color: #008f91;
        box-shadow: 0 18px 42px rgba(0, 143, 145, 0.12);
        transform: translateY(-2px);
      }

      .app-link strong {
        color: #008f91;
        font-size: 24px;
      }

      .app-link span {
        color: #647386;
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Mini Apps</h1>
      <p>업무와 워크숍에 바로 사용할 수 있는 작은 도구 모음입니다.</p>

      <section class="app-list" aria-label="앱 목록">
        <a class="app-link" href="./team-randomizer/">
          <strong>팀 랜덤 배정 도구</strong>
          <span>이름을 입력하고 원하는 팀 개수로 무작위 배정합니다.</span>
        </a>
        <a class="app-link" href="./cosmic-draw-arena/">
          <strong>우주 추첨 아레나</strong>
          <span>이름 카드가 하나씩 탈락하고, 최후의 1인에게 왕관과 폭죽이 터집니다.</span>
        </a>
        <a class="app-link" href="./ai-analysis-skillset/">
          <strong>AI 분석 스킬 셋</strong>
          <span>기획자의 AI 질문 흐름을 이해, 포지셔닝, 작동원리, 진단, 전략으로 시각화합니다.</span>
        </a>
        <a class="app-link" href="./pdf-deskew/">
          <strong>PDF 기울기 보정</strong>
          <span>스캔한 PDF 파일을 선택해서 페이지별 기울기를 보정하는 Windows 앱입니다.</span>
        </a>
      </section>
    </main>
  </body>
</html>
